name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Prepare test env
        # 더미 .env 를 .env.test 로부터 복사. 실제 슬랙/구글/빅쿼리 호출은 mock 으로 차단된다.
        run: cp .env.test .env

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Run tests
        run: uv run pytest -q
